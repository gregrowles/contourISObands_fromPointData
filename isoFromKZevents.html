<html lang="en">

    <style type="text/css" id="mapStyles">
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
        }

        #leafMap {
            width: calc(100vw - 20px);
            height: 100vh;
        }

        svg path:focus          { outline: none; }

        .intersections {
            stroke-width: 2px;
            stroke-opacity: 0.35;
            stroke: #fff;
        }

        .strokeLinesHidden {
            stroke: none;
        }

        .shadow {
            filter: drop-shadow(0px -4px 4px rgba(0, 0, 0, 0.4));
        }

        .boundary {
            stroke-width: 1px;
            stroke-opacity: 0.9;
            stroke: #444;
            fill-opacity: 0;
        }

        svg path.points       { display: block; filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.25)); z-index: 9999;}
        /* svg path.intersections { display: block; } */
    </style>

</head>

<body>
    <div id="leafMap"></div>
</body>

<script>

    var g_queryDataSources = {};

    /* ─── Config ────────────────────────────────────────────────── */
    const RUN_CONTOUR_CLIPPING     = true;
    const SHOW_CONTOUR_SHADOW      = false;
    const SHOW_POINTS              = false;
    const POINT_RADIUS             = 3;
    const SHOW_GRID                = false;
    const GRID_VALUE_ROUNDING      = 2;
    const SHOW_CONTOUR_EDGELINE    = true;   // ISO contour edge line is shown (white) Y/N
    const CONTOUR_EDGELINE_COLOR   = '#fff';   // ISO contour edge line color
    const CONTOUR_EDGELINE_WIDTH   = 0.5;   // ISO contour edge line color
    const SMOOTH_ITERATIONS        = 5;      // 0 = off
    const COLOR_THEME              = 'goldstein'; // 'default' | 'heat' | 'snow' | 'glacier' | 'lava' | 'blueGreen' | 'blueRed' | 'greenBlue'
    const OVERRIDE_COLOR_OPACITY   = 0.6;    // 0-1, higher = more opaque
    const INTERPOLATION_UNITS      = 'kilometers';
    const INTERPOLATION_UNIT_CELL_SIZE  = 10;   // kilometers/degrees
    const INTERPOLATION_WEIGHT     = 3;  // 1-10, higher = more influence from nearby points (distance-decay weighting)
    const INTERPOLATION_GRID_TYPE  = 'point'; // defines the output format based on a Grid Type (options: 'square' | 'point' | 'hex' | 'triangle') (default 'square')
    // const DATA_FILE_AGENT_FILTER   = 'ABNORMAL_AGGRESSIVE_BEHAVIOUR_DOGS'; // 'data.json' | 'data.csv'

    /* ─── Visual theme palettes ──────────────────────────────────── */

        default: [
            { fill: '#e3e3ff', fillColor: '#e3e3ff', fillOpacity: 1.00 },
            { fill: '#c6c6ff', fillColor: '#c6c6ff', fillOpacity: 1.00 },
            { fill: '#a9aaff', fillColor: '#a9aaff', fillOpacity: 1.00 },
            { fill: '#8e8eff', fillColor: '#8e8eff', fillOpacity: 1.00 },
            { fill: '#7171ff', fillColor: '#7171ff', fillOpacity: 1.00 },
            { fill: '#5554ff', fillColor: '#5554ff', fillOpacity: 1.00 },
            { fill: '#5554ff', fillColor: '#5554ff', fillOpacity: 1.00 },
            { fill: '#3939ff', fillColor: '#3939ff', fillOpacity: 1.00 },
            { fill: '#1b1cff', fillColor: '#1b1cff', fillOpacity: 1.00 },
            { fill: '#1b1cff', fillColor: '#1b1cff', fillOpacity: 1.00 },
            { fill: '#1b1cff', fillColor: '#1b1cff', fillOpacity: 1.00 },
        ],
        snow: [
            { fillColor: '#fff', fillOpacity: 0.70 },
            { fillColor: '#fff', fillOpacity: 0.75 },
            { fillColor: '#fff', fillOpacity: 0.80 },
            { fillColor: '#fff', fillOpacity: 0.85 },
            { fillColor: '#fff', fillOpacity: 0.88 },
            { fillColor: '#fff', fillOpacity: 0.90 },
            { fillColor: '#fff', fillOpacity: 0.92 },
            { fillColor: '#fff', fillOpacity: 0.94 },
            { fillColor: '#fff', fillOpacity: 0.96 },

            { fillColor: '#fff', fillOpacity: 1.00 },
        ],
        glacier: [ //#B0C8DB,#B9CFE1,#C3D7E7,#CDDFED,#D7E7F3,#E1EFF8,#EBF7FF,#F0F9FF,#F5FBFF,#FAFDFF,#FFFFFF
            { fillColor: '#B0C8DB', fillOpacity: 0.98 },
            { fillColor: '#B9CFE1', fillOpacity: 0.98 },
            { fillColor: '#C3D7E7', fillOpacity: 0.96 },
            { fillColor: '#CDDFED', fillOpacity: 0.94 },
            { fillColor: '#D7E7F3', fillOpacity: 0.92 },
            { fillColor: '#E1EFF8', fillOpacity: 0.90 },
            { fillColor: '#EBF7FF', fillOpacity: 0.89 },
            { fillColor: '#F0F9FF', fillOpacity: 0.88 },
            { fillColor: '#F5FBFF', fillOpacity: 0.87 },
            { fillColor: '#FAFDFF', fillOpacity: 0.86 },
            { fillColor: '#FFFFFF', fillOpacity: 0.85 },
        ],
        heat: [ //#3CFF00,#80FF23,#B7FF46,#D4FF23,#FFFF00,#FFBF00,#FF7F00,#FF3F00,#FF0000,#BA0022,#750044
            { fillColor: '#3CFF00', fillOpacity: 1 },
            { fillColor: '#80FF23', fillOpacity: 1 },
            { fillColor: '#B7FF46', fillOpacity: 1 },
            { fillColor: '#D4FF23', fillOpacity: 1 },
            { fillColor: '#FFFF00', fillOpacity: 1 },
            { fillColor: '#FFBF00', fillOpacity: 1 },
            { fillColor: '#FF7F00', fillOpacity: 1 },
            { fillColor: '#FF3F00', fillOpacity: 1 },
            { fillColor: '#FF0000', fillOpacity: 1 },
            { fillColor: '#BA0022', fillOpacity: 1 },
            { fillColor: '#750044', fillOpacity: 1 },
        ],
        lava: [ //#AFAFA5,#B9968C,#C37E73,#CD655A,#D74D41,#E23528,#E7701E,#EDAB14,#F3E70A,#F3EB58,#F4EFA7,#F5F3F7
            { fillColor: '#AFAFA5', fillOpacity: 1 },
            { fillColor: '#B9968C', fillOpacity: 1 },
            { fillColor: '#C37E73', fillOpacity: 1 },
            { fillColor: '#CD655A', fillOpacity: 1 },
            { fillColor: '#D74D41', fillOpacity: 1 },
            { fillColor: '#E23528', fillOpacity: 1 },
            { fillColor: '#E7701E', fillOpacity: 1 },
            { fillColor: '#EDAB14', fillOpacity: 1 },
            { fillColor: '#F3E70A', fillOpacity: 1 },
            { fillColor: '#F3EB58', fillOpacity: 1 },
            { fillColor: '#F4EFA7', fillOpacity: 1 },
            { fillColor: '#F5F3F7', fillOpacity: 1 },

        ],
        goldstein: [ //#FCFDBF,#FCE3A7,#FDC98F,#FEB078,#FD9668,#F9795D,#F1605D,#E24D67,#CD4071,#B73779,#9E2F7F,#882781,#721E81,#5C177F,#440F76,#2C115F,#190F3D,#08071E,#000004
            { fillColor: '#FCFDBF', fillOpacity: 1 },
            { fillColor: '#FCE3A7', fillOpacity: 1 },
            { fillColor: '#FDC98F', fillOpacity: 1 },
            { fillColor: '#FEB078', fillOpacity: 1 },
            { fillColor: '#FD9668', fillOpacity: 1 },
            { fillColor: '#F9795D', fillOpacity: 1 },
            { fillColor: '#F1605D', fillOpacity: 1 },
            { fillColor: '#E24D67', fillOpacity: 1 },
            { fillColor: '#CD4071', fillOpacity: 1 },
            { fillColor: '#B73779', fillOpacity: 1 },
            { fillColor: '#9E2F7F', fillOpacity: 1 },
            { fillColor: '#882781', fillOpacity: 1 },
            { fillColor: '#721E81', fillOpacity: 1 },
            { fillColor: '#5C177F', fillOpacity: 1 },
            { fillColor: '#440F76', fillOpacity: 1 },
            { fillColor: '#2C115F', fillOpacity: 1 },
            { fillColor: '#190F3D', fillOpacity: 1 },
            { fillColor: '#08071E', fillOpacity: 1 },
            { fillColor: '#000004', fillOpacity: 1 }
        ],
        blueGreen: [ //##0094F0,#13A3DA,#27B2C6,#3AC0B6,#4DCCA8,#5ED79D,#57DD82,#51E366,#4CEB46,#47F424,#44FF00
            { fillColor: '#0094F0', fillOpacity: 1 },
            { fillColor: '#13A3DA', fillOpacity: 1 },
            { fillColor: '#27B2C6', fillOpacity: 1 },
            { fillColor: '#3AC0B6', fillOpacity: 1 },
            { fillColor: '#4DCCA8', fillOpacity: 1 },
            { fillColor: '#5ED79D', fillOpacity: 1 },
            { fillColor: '#57DD82', fillOpacity: 1 },
            { fillColor: '#51E366', fillOpacity: 1 },
            { fillColor: '#4CEB46', fillOpacity: 1 },
            { fillColor: '#47F424', fillOpacity: 1 },
            { fillColor: '#44FF00', fillOpacity: 1 },
        ],
        blueRed: [ //#0094F0,#32A7EA,#65BBE5,#98CEDF,#CBE2DA,#FEF6D5,#F3C4AE,#E89387,#DD6261,#D2313A,#C70014
            { fillColor: '#0094F0', fillOpacity: 1 },
            { fillColor: '#32A7EA', fillOpacity: 0.95 },
            { fillColor: '#65BBE5', fillOpacity: 0.9 },
            { fillColor: '#98CEDF', fillOpacity: 0.85 },
            { fillColor: '#CBE2DA', fillOpacity: 0.8 },
            { fillColor: '#FEF6D5', fillOpacity: 0.75 },
            { fillColor: '#F3C4AE', fillOpacity: 0.8 },
            { fillColor: '#E89387', fillOpacity: 0.85 },
            { fillColor: '#DD6261', fillOpacity: 0.9 },
            { fillColor: '#D2313A', fillOpacity: 0.95 },
            { fillColor: '#C70014', fillOpacity: 1 },
        ],
        greenBlue: [ //#34E933,#33E041,#32D74F,#32CE5D,#31C56A,#31BC79,#30B387,#2FAA94,#2FA1A2,#2E98B0,#2E8FBF
            { fillColor: '#34E933', fillOpacity: 1 },
            { fillColor: '#33E041', fillOpacity: 1 },
            { fillColor: '#32D74F', fillOpacity: 1 },
            { fillColor: '#32CE5D', fillOpacity: 1 },
            { fillColor: '#31C56A', fillOpacity: 1 },
            { fillColor: '#31BC79', fillOpacity: 1 },
            { fillColor: '#30B387', fillOpacity: 1 },
            { fillColor: '#2FAA94', fillOpacity: 1 },
            { fillColor: '#2FA1A2', fillOpacity: 1 },
            { fillColor: '#2E98B0', fillOpacity: 1 },
            { fillColor: '#2E8FBF', fillOpacity: 1 }
        ]
    };

    const rangePaletteGroups = PALETTES[ COLOR_THEME ] || PALETTES.default;

    /* ─── Helper: build isoband range → style lookup ─────────────── */
    const buildRangeLookup = ( breaks, theme ) => {
        const lookup = {};
        for ( let i = 0; i < breaks.length - 1; i++ ) {
            const key = `${ breaks[ i ] }-${ breaks[ i + 1 ] }`;
            lookup[ key ] = {};
            // Object.keys( palettes ).forEach( theme => {
                lookup[ key ][ theme ] = PALETTES[ theme ][ i ];
                if ( OVERRIDE_COLOR_OPACITY > 0 ) {
                    lookup[ key ][ theme ].fillOpacity = OVERRIDE_COLOR_OPACITY;
                }
            // });
        }
        return lookup;
    };

    const createClassRanges = ( min, max, classGroup ) => {
        const classes = classGroup.length;
        if ( classes < 1 ) throw new Error( 'classes must be >= 1' );
        if ( max <= min  ) throw new Error( 'max must be > min' );

        const width = ( max - min ) / classes;
        return Array.from( { length: classes }, ( _, i ) => ({
            min: parseFloat( ( min + i * width ) ), //.toFixed( 2 )
            max: parseFloat( ( i === classes - 1 ? max : min + ( i + 1 ) * width ) ), //.toFixed( 2 )
            text: classGroup[ i ]?.fill || classGroup[ i ]?.fillColor
        }) );
    };

    /* ─── GeoJSON wrapper ────────────────────────────────────────── */
    const makeFeatureCollection = ( features, name = 'layer' ) => ({
        type: 'FeatureCollection',
        name,
        crs: { type: 'name', properties: { name: 'urn:ogc:def:crs:OGC:1.3:CRS84' } },
        features
    });

    /* ─── Polygon intersection + optional smoothing ──────────────── */
    const clipIsobandsToBoundary = ( isobands, boundaries ) => {
        return isobands.features.flatMap( isoband =>
            boundaries.features.reduce( ( acc, boundary ) => {
                try {
                    let src = isoband;
                    let clipped = turf.intersect( src, boundary );
                    if ( !clipped ) {
                        src = turf.buffer( src, 0 );
                        clipped = turf.intersect( src, boundary );
                    }
                    if ( clipped ) {
                        clipped.properties = { ...isoband.properties };
                        clipped.id = Math.random() * 10000;
                        acc.push( clipped );
                    }
                } catch ( e ) {
                    console.warn( 'Intersection error:', e );
                }
                return acc;
            }, [] )
        );
    };

    const smoothFeatures = ( features, iterations ) => {
        return features.map( feature => {
            try {
                const polygon  = turf.polygon( feature.geometry.coordinates );
                const smoothed = turf.polygonSmooth( polygon, { iterations } );
                feature.geometry.coordinates = smoothed.features[ 0 ].geometry.coordinates;
            } catch ( e ) {
                console.warn( 'Smooth error:', e, feature );
            }
            return feature;
        });
    };

    /* ─── Leaflet style callbacks ─────────────────────────────────── */
    let rangeLookup = {};

    /* ─── Main ───────────────────────────────────────────────────── */
    const init = async () => {

        /* Build Turf point features */

        // load boundary layer (for clipping) and point data (for interpolation)
        const [ boundaryFeatures, pointData ] = await Promise.all([
            getKZGeoJSON(),
            getPointDataNew()
        ]);

        // cache refPoints values; clear for new configuration change testing
        var refPoints = localStorage.getItem( 'refPoints' ) || [];

        if ( refPoints.length == 0 ) {
            const filtData = pointData; //.filter( row => row.agent === DATA_FILE_AGENT_FILTER ); //.filter( row => row.agent === DATA_FILE_AGENT_FILTER );
            const unqCoords = [...new Set(filtData.map(row => row.geometry.coordinates.toString()))];
            unqCoords.forEach( (coords,i) => {
                const orgUnitPoints = filtData.filter( row => row.geometry.coordinates.toString() === coords );
                const formatCoords = JSON.parse('[' + orgUnitPoints[0].geometry.coordinates + ']')
                // if ( i < 100 ) 
                refPoints.push( { coords: formatCoords, val: parseFloat(parseFloat( Math.random() * 100 ).toFixed(0)) } ); //orgUnitPoints.length
            });
        }
        else refPoints = JSON.parse( refPoints );

        g_queryDataSources[ 'refPoints' ] = refPoints;

        const pointArr = refPoints.reduce( ( acc, row ) => {
            acc.push( turf.point( row.coords, { name: 'random', code: 'code', level: 5,
                value: row.val
            }) );
            return acc;
        }, [] );

        g_queryDataSources[ 'pointArr' ] = pointArr;

        const sortedVals = refPoints.map( r => parseFloat( r.val ) ).sort( (a, b) => a - b );
        const paletteClassRanges = createClassRanges( Math.floor(sortedVals[0]), Math.ceil( sortedVals[sortedVals.length - 1] ), rangePaletteGroups );
        
        g_queryDataSources[ 'paletteClassRanges' ] = paletteClassRanges;
        
        /* Interpolation */
        const grid = turf.interpolate(
            turf.featureCollection( pointArr ),
            INTERPOLATION_UNIT_CELL_SIZE,
            { gridType: INTERPOLATION_GRID_TYPE, property: 'value', units: INTERPOLATION_UNITS, weight: INTERPOLATION_WEIGHT }
        );

        // round grid values down to custom decimal places for display
        grid.features.forEach( f => ( f.properties.value = parseFloat( f.properties.value ).toFixed( GRID_VALUE_ROUNDING ) ) );

        g_queryDataSources[ 'grid' ] = grid;

        if ( ! localStorage.getItem( 'refPoints' )) {
            localStorage.setItem( 'refPoints', JSON.stringify( refPoints ) );
        }

        if ( INTERPOLATION_GRID_TYPE != 'point') {
            grid.features.forEach( f => {
                const center = turf.centroid(turf.polygon(f.geometry.coordinates));
                f.geometry.coordinates = center.geometry.coordinates;
                f.geometry.type = 'Point';
            });
        }

        /* Isobands */
        const PALETTE_ISO_BREAKS = [...paletteClassRanges.map( row => row.min ), Math.ceil( sortedVals[sortedVals.length - 1] )];

        g_queryDataSources[ 'PALETTE_ISO_BREAKS' ] = PALETTE_ISO_BREAKS;

        rangeLookup = buildRangeLookup( PALETTE_ISO_BREAKS, COLOR_THEME );

        //@Greg: commonProperties > create a function to dynamically set properties for rendering tool (Leaflet/MapLibre): each may require different properties for rendering (e.g., fill-opacity, color, line-width, etc.)
        const isobandFC  = turf.flatten( turf.isobands( grid, PALETTE_ISO_BREAKS, {
            zProperty: 'value',
            commonProperties: { 'fill-opacity': OVERRIDE_COLOR_OPACITY > 0 ? OVERRIDE_COLOR_OPACITY : 1, 'stroke': CONTOUR_EDGELINE_COLOR, 'stroke-width': SHOW_CONTOUR_EDGELINE ? CONTOUR_EDGELINE_WIDTH : 0, 'stroke-opacity': 0.35 }, //line-color+line-width added for testing in MapLibre GL JS (not Leaflet)
            breaksProperties: rangePaletteGroups.map( p => ({ fill: p?.fill || p?.fillColor }) )
        }) );

        g_queryDataSources[ 'isobandFC' ] = isobandFC;

        var intersections;

        if ( RUN_CONTOUR_CLIPPING ) {
            const boundaryFC = turf.flatten( makeFeatureCollection( boundaryFeatures, 'boundaries' ) );

            /* Clip & smooth */
            let clipped = clipIsobandsToBoundary( isobandFC, boundaryFC );

            if ( SMOOTH_ITERATIONS ) clipped = smoothFeatures( clipped, SMOOTH_ITERATIONS );

            intersections = turf.featureCollection( clipped );
            g_queryDataSources[ 'intersections' ] = intersections;
        }

        const styleISObands   = (f) => rangeLookup[ f.properties.value ]?.[ COLOR_THEME ] ?? {};
        const stylePoints     = () => ({ fillColor: '#333', fillOpacity: 0.8, color: '#3BDAFF', radius: POINT_RADIUS, weight: 1, className: 'points' });
        const styleGridMarker = () => ({ fillColor: '#000', fillOpacity: 0.1, color: '#000', weight: 0.5, className: 'grid' });

        /* ─── Leaflet map ──────────────────────────────────────────── */
        const leafmap = L.map( 'leafMap', {
            renderer:         L.svg( { padding: 500 } ),
            scrollWheelZoom:  false,
            smoothWheelZoom:  true,
            smoothSensitivity: 1
        });

        L.control.scale( { position: 'bottomleft', metric: true, imperial: false, maxWidth: 150 } ).addTo( leafmap );
        L.control.zoom(  { position: 'topright' } ).addTo( leafmap );

        L.tileLayer( 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo( leafmap );

        /* Isoband intersections */
        if ( RUN_CONTOUR_CLIPPING ) {
            if ( intersections.features.length ) {
                const isoLayer = L.geoJson( intersections, {
                    style:          styleISObands,
                    className:      ( SHOW_CONTOUR_EDGELINE ? 'intersections' : 'strokeLinesHidden' ) + ( SHOW_CONTOUR_SHADOW ? ' shadow' : '' ),
                    onEachFeature:  onEachBoundaryFeature
                }).addTo( leafmap );

                leafmap.fitBounds( isoLayer.getBounds(), { padding: [1, 1] } );

                localStorage.setItem( 'isobands', JSON.stringify( intersections ) );
            }
        }
        else {
            if ( isobandFC.features.length ) {
                const isoLayer = L.geoJson( isobandFC, {
                    style:          styleISObands,
                    className:      ( SHOW_CONTOUR_EDGELINE ? 'intersections' : 'strokeLinesHidden' ) + ( SHOW_CONTOUR_SHADOW ? ' shadow' : '' ),
                    onEachFeature:  onEachBoundaryFeature
                }).addTo( leafmap );

                leafmap.fitBounds( isoLayer.getBounds(), { padding: [1, 1] } );

                localStorage.setItem( 'isobands', JSON.stringify( isobandFC ) );
            }
        }

        /* Reference points */
        if ( SHOW_POINTS ) {
            console.log( 'refPoints', refPoints );
            refPoints.forEach( ( { coords, val } ) => {
                L.circleMarker( [coords[1],coords[0]], stylePoints() )
                 .bindTooltip( `<h4>${ val }</h4>` )
                 .addTo( leafmap );
            });
        }

        if ( SHOW_GRID ) {

            L.geoJSON(grid, {
                pointToLayer: function (feature, latlng) {
                    
                    // Extract properties from the current feature
                    const labelText = feature.properties.value;
                    const countValue = feature.properties.value;

                    // Create a custom L.divIcon dynamically populated with HTML text
                    const customDivIcon = L.divIcon({
                        className: 'custom-map-label', // CSS class for overall styling
                        html: `<div class="marker-wrapper">
                                <span class="badge">${countValue}</span>
                                </div>`,
                        iconSize: [60, 40],            // Explicit sizing prevents displacement
                        iconAnchor: [30, 20]           // Anchor [X, Y] pins the center of the icon
                    });

                    // Return a standard marker bound to your custom L.divIcon
                    return L.marker(latlng, { icon: customDivIcon });
                }
            }).addTo( leafmap );
        }

    };

    init().catch( console.error );

</script>
</html>
