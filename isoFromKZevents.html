<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isobands – Kenya</title>

    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"
            integrity="sha512-BwHfrr4c9kmRkLw6iXFdzcdWV/PGkVgiIyIWLLlTSXzWQzxuSg4DiQUCpauz/EWjgk5TYQqX/kvn9pG1NpYfqg=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link  rel="stylesheet"
           href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"
           integrity="sha512-Zcn6bjR/8RZbLEpLIeOwNtzREBAJnUKESxces60Mpoj+2okopSAcSUIUOseddDm0cxnGQzxIR7vJgsLZbdLE3w=="
           crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"></script>

    <script src="SmoothWheelZoom.js"></script>
    <script src="isobands.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
        }

        #leafMap {
            width: calc(100vw - 20px);
            height: 100vh;
        }

        svg path:focus          { outline: none; }

        .intersections {
            stroke-width: 1px;
            stroke-opacity: 0.35;
            stroke: #fff;
            /*filter: drop-shadow(0px -4px 4px rgba(0, 0, 0, 0.65));*/
        }

        .shadow {
            filter: drop-shadow(0px -4px 4px rgba(0, 0, 0, 0.4));
        }

        .boundary {
            stroke-width: 1px;
            stroke-opacity: 0.9;
            stroke: #444;
            fill-opacity: 0;
        }

        svg path.points       { display: block; filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.25)); }
        svg path.intersections { display: block; }
    </style>

</head>

<body>
    <div id="leafMap"></div>
</body>

<script>
    /* ─── Config ────────────────────────────────────────────────── */
    const RUN_CONTOUR_CLIPPING     = false;
    const SHADOW_ISOCONTOURS       = true;
    const SHOW_POINTS              = true;
    const SMOOTH_ITERATIONS        = 3;      // 0 = off
    const VISUAL_STYLE             = 'blueRed'; // 'default' | 'heat' | 'snow' | 'glacier' | 'blueGreen' | 'blueRed' | 'greenBlue'
    const INTERPOLATION_UNITS      = 'kilometers';
    const INTERPOLATION_UNIT_CELL_SIZE  = 10;   // kilometers/degrees
    const INTERPOLATION_WEIGHT     = 8;  // 1-10, higher = more influence from nearby points (distance-decay weighting)
    const DATA_FILE_AGENT_FILTER   = 'ABNORMAL_AGGRESSIVE_BEHAVIOUR_DOGS'; // 'data.json' | 'data.csv'

    /* ─── Visual theme palettes ──────────────────────────────────── */
    const PALETTES = {
        default: [
            { fill: '#e3e3ff', fillColor: '#e3e3ff', fillOpacity: 1.00 },
            { fill: '#c6c6ff', fillColor: '#c6c6ff', fillOpacity: 1.00 },
            { fill: '#a9aaff', fillColor: '#a9aaff', fillOpacity: 1.00 },
            { fill: '#8e8eff', fillColor: '#8e8eff', fillOpacity: 1.00 },
            { fill: '#7171ff', fillColor: '#7171ff', fillOpacity: 1.00 },
            { fill: '#5554ff', fillColor: '#5554ff', fillOpacity: 1.00 },
            { fill: '#5554ff', fillColor: '#5554ff', fillOpacity: 1.00 },
            { fill: '#3939ff', fillColor: '#3939ff', fillOpacity: 1.00 },
            { fill: '#1b1cff', fillColor: '#1b1cff', fillOpacity: 1.00 },
            { fill: '#1b1cff', fillColor: '#1b1cff', fillOpacity: 1.00 },
            { fill: '#1b1cff', fillColor: '#1b1cff', fillOpacity: 1.00 },
        ],
        snow: [
            { fillColor: '#fff', fillOpacity: 0.70 },
            { fillColor: '#fff', fillOpacity: 0.75 },
            { fillColor: '#fff', fillOpacity: 0.80 },
            { fillColor: '#fff', fillOpacity: 0.85 },
            { fillColor: '#fff', fillOpacity: 0.88 },
            { fillColor: '#fff', fillOpacity: 0.90 },
            { fillColor: '#fff', fillOpacity: 0.92 },
            { fillColor: '#fff', fillOpacity: 0.94 },
            { fillColor: '#fff', fillOpacity: 0.96 },
            { fillColor: '#fff', fillOpacity: 0.98 },
            { fillColor: '#fff', fillOpacity: 1.00 },
        ],
        glacier: [ //#EDF2F7,#DDE7F0,#CEDDE9,#BFD2E2,#B0C8DB,#A1BED4,#91B5D0,#81ADCC,#72A4C8,#629CC4,#5394C1
            { fillColor: '#EDF2F7', fillOpacity: 1.00 },
            { fillColor: '#DDE7F0', fillOpacity: 1.00 },
            { fillColor: '#CEDDE9', fillOpacity: 1.00 },
            { fillColor: '#BFD2E2', fillOpacity: 1.00 },
            { fillColor: '#B0C8DB', fillOpacity: 1.00 },
            { fillColor: '#A1BED4', fillOpacity: 1.00 },
            { fillColor: '#91B5D0', fillOpacity: 1.00 },
            { fillColor: '#81ADCC', fillOpacity: 1.00 },
            { fillColor: '#72A4C8', fillOpacity: 1.00 },
            { fillColor: '#629CC4', fillOpacity: 1.00 },
            { fillColor: '#5394C1', fillOpacity: 1.00 },
        ],
        heat: [ //#3CFF00,#80FF23,#B7FF46,#D4FF23,#FFFF00,#FFBF00,#FF7F00,#FF3F00,#FF0000,#BA0022,#750044
            { fillColor: '#3CFF00', fillOpacity: 1 },
            { fillColor: '#80FF23', fillOpacity: 1 },
            { fillColor: '#B7FF46', fillOpacity: 1 },
            { fillColor: '#D4FF23', fillOpacity: 1 },
            { fillColor: '#FFFF00', fillOpacity: 1 },
            { fillColor: '#FFBF00', fillOpacity: 1 },
            { fillColor: '#FF7F00', fillOpacity: 1 },
            { fillColor: '#FF3F00', fillOpacity: 1 },
            { fillColor: '#FF0000', fillOpacity: 1 },
            { fillColor: '#BA0022', fillOpacity: 1 },
            { fillColor: '#750044', fillOpacity: 1 },
        ],
        blueGreen: [ //##0094F0,#13A3DA,#27B2C6,#3AC0B6,#4DCCA8,#5ED79D,#57DD82,#51E366,#4CEB46,#47F424,#44FF00
            { fillColor: '#0094F0', fillOpacity: 1 },
            { fillColor: '#13A3DA', fillOpacity: 1 },
            { fillColor: '#27B2C6', fillOpacity: 1 },
            { fillColor: '#3AC0B6', fillOpacity: 1 },
            { fillColor: '#4DCCA8', fillOpacity: 1 },
            { fillColor: '#5ED79D', fillOpacity: 1 },
            { fillColor: '#57DD82', fillOpacity: 1 },
            { fillColor: '#51E366', fillOpacity: 1 },
            { fillColor: '#4CEB46', fillOpacity: 1 },
            { fillColor: '#47F424', fillOpacity: 1 },
            { fillColor: '#44FF00', fillOpacity: 1 },
        ],
        blueRed: [ //#0094F0,#32A7EA,#65BBE5,#98CEDF,#CBE2DA,#FEF6D5,#F3C4AE,#E89387,#DD6261,#D2313A,#C70014
            { fillColor: '#0094F0', fillOpacity: 1 },
            { fillColor: '#32A7EA', fillOpacity: 0.95 },
            { fillColor: '#65BBE5', fillOpacity: 0.9 },
            { fillColor: '#98CEDF', fillOpacity: 0.85 },
            { fillColor: '#CBE2DA', fillOpacity: 0.8 },
            { fillColor: '#FEF6D5', fillOpacity: 0.75 },
            { fillColor: '#F3C4AE', fillOpacity: 0.8 },
            { fillColor: '#E89387', fillOpacity: 0.85 },
            { fillColor: '#DD6261', fillOpacity: 0.9 },
            { fillColor: '#D2313A', fillOpacity: 0.95 },
            { fillColor: '#C70014', fillOpacity: 1 },
        ],
        greenBlue: [ //#34E933,#33E041,#32D74F,#32CE5D,#31C56A,#31BC79,#30B387,#2FAA94,#2FA1A2,#2E98B0,#2E8FBF
            { fillColor: '#34E933', fillOpacity: 1 },
            { fillColor: '#33E041', fillOpacity: 1 },
            { fillColor: '#32D74F', fillOpacity: 1 },
            { fillColor: '#32CE5D', fillOpacity: 1 },
            { fillColor: '#31C56A', fillOpacity: 1 },
            { fillColor: '#31BC79', fillOpacity: 1 },
            { fillColor: '#30B387', fillOpacity: 1 },
            { fillColor: '#2FAA94', fillOpacity: 1 },
            { fillColor: '#2FA1A2', fillOpacity: 1 },
            { fillColor: '#2E98B0', fillOpacity: 1 },
            { fillColor: '#2E8FBF', fillOpacity: 1 }
        ]
    };

    const rangePaletteGroups = PALETTES[ VISUAL_STYLE ] || PALETTES.default;

    /* ─── Helper: build isoband range → style lookup ─────────────── */
    const buildRangeLookup = ( breaks, palettes ) => {
        const lookup = {};
        for ( let i = 0; i < breaks.length - 1; i++ ) {
            const key = `${ breaks[ i ] }-${ breaks[ i + 1 ] }`;
            lookup[ key ] = {};
            Object.keys( palettes ).forEach( theme => {
                lookup[ key ][ theme ] = palettes[ theme ][ i ];
            });
        }
        return lookup;
    };

    const createClassRanges = ( min, max, classes ) => {
        if ( classes < 1 ) throw new Error( 'classes must be >= 1' );
        if ( max <= min  ) throw new Error( 'max must be > min' );

        const width = ( max - min ) / classes;
        return Array.from( { length: classes }, ( _, i ) => ({
            min: parseFloat( ( min + i * width ) ), //.toFixed( 2 )
            max: parseFloat( ( i === classes - 1 ? max : min + ( i + 1 ) * width ) ) //.toFixed( 2 )
        }) );
    };

    /* ─── GeoJSON wrapper ────────────────────────────────────────── */
    const makeFeatureCollection = ( features, name = 'layer' ) => ({
        type: 'FeatureCollection',
        name,
        crs: { type: 'name', properties: { name: 'urn:ogc:def:crs:OGC:1.3:CRS84' } },
        features
    });

    /* ─── Polygon intersection + optional smoothing ──────────────── */
    const clipIsobandsToBoundary = ( isobands, boundaries ) => {
        return isobands.features.flatMap( isoband =>
            boundaries.features.reduce( ( acc, boundary ) => {
                try {
                    let src = isoband;
                    let clipped = turf.intersect( src, boundary );
                    if ( !clipped ) {
                        src = turf.buffer( src, 0 );
                        clipped = turf.intersect( src, boundary );
                    }
                    if ( clipped ) {
                        clipped.properties = { ...isoband.properties };
                        clipped.id = Math.random() * 10000;
                        acc.push( clipped );
                    }
                } catch ( e ) {
                    console.warn( 'Intersection error:', e );
                }
                return acc;
            }, [] )
        );
    };

    const smoothFeatures = ( features, iterations ) => {
        return features.map( feature => {
            try {
                const polygon  = turf.polygon( feature.geometry.coordinates );
                const smoothed = turf.polygonSmooth( polygon, { iterations } );
                feature.geometry.coordinates = smoothed.features[ 0 ].geometry.coordinates;
            } catch ( e ) {
                console.warn( 'Smooth error:', e, feature );
            }
            return feature;
        });
    };

    /* ─── Leaflet style callbacks ─────────────────────────────────── */
    let rangeLookup = {};

    const styleISObands = ( f ) => rangeLookup[ f.properties.value ]?.[ VISUAL_STYLE ] ?? {};
    const stylePoints   = ()    => ({ fillColor: '#333', fillOpacity: 0.8, color: '#3BDAFF', radius: 4, weight: 1, className: 'points' });

    /* ─── Main ───────────────────────────────────────────────────── */
    const init = async () => {

        const [ boundaryFeatures, pointData ] = await Promise.all([
            getKEGeoJSON(),
            getPointDataNew()
        ]);

        /* Build Turf point features */
        const refPoints = [];
        const filtData = pointData; //.filter( row => row.agent === DATA_FILE_AGENT_FILTER ); //.filter( row => row.agent === DATA_FILE_AGENT_FILTER );
        const unqCoords = [...new Set(filtData.map(row => row.geometry.coordinates.toString()))];

        unqCoords.forEach( (coords,i) => {
            const orgUnitPoints = filtData.filter( row => row.geometry.coordinates.toString() === coords );
            const formatCoords = JSON.parse('[' + orgUnitPoints[0].geometry.coordinates + ']')
            // if ( i < 100 ) 
            refPoints.push( { coords: formatCoords, val: parseFloat(parseFloat( Math.random() * 100 ).toFixed(0)) } ); //orgUnitPoints.length
        });

        const pointArr = refPoints.reduce( ( acc, row ) => {
            acc.push( turf.point( row.coords, { name: 'random', code: 'code', level: 5,
                value: row.val
            }) );
            return acc;
        }, [] );
        console.log( 'pointArr', pointArr );

        const sortedVals = refPoints.map( r => parseFloat( r.val ) ).sort( (a, b) => a - b );
        const paletteClassRanges = createClassRanges( Math.floor(sortedVals[0]), Math.ceil( sortedVals[sortedVals.length - 1] ), rangePaletteGroups.length );
        console.log( 'paletteClassRanges', paletteClassRanges );

        /* Interpolation */
        const grid = turf.interpolate(
            turf.featureCollection( pointArr ),
            INTERPOLATION_UNIT_CELL_SIZE,
            { gridType: 'points', property: 'value', units: INTERPOLATION_UNITS, weight: INTERPOLATION_WEIGHT }
        );
        
        grid.features.forEach( f => ( f.properties.value = parseFloat( f.properties.value ).toFixed( 2 ) ) );
        console.log( 'grid', grid );

        /* Isobands */
        const PALETTE_ISO_BREAKS = [...paletteClassRanges.map( row => row.min ), Math.ceil( sortedVals[sortedVals.length - 1] )];
        console.log( 'PALETTE_ISO_BREAKS', PALETTE_ISO_BREAKS );
        rangeLookup = buildRangeLookup( PALETTE_ISO_BREAKS, PALETTES );
        console.log( 'rangeLookup', rangeLookup );

        const isobandFC  = turf.flatten( turf.isobands( grid, PALETTE_ISO_BREAKS, {
            zProperty: 'value',
            commonProperties: { 'fill-opacity': 1 },
            breaksProperties: rangePaletteGroups.map( p => ({ fill: p?.fill || p?.fillColor }) )
        }) );
        console.log( 'isobandFC', isobandFC );

        var intersections;

        if ( RUN_CONTOUR_CLIPPING ) {
            const boundaryFC = turf.flatten( makeFeatureCollection( boundaryFeatures, 'boundaries' ) );
            console.log( 'boundaryFC', boundaryFC );

            /* Clip & smooth */
            let clipped = clipIsobandsToBoundary( isobandFC, boundaryFC );
            console.log( 'clipped', clipped );
            if ( SMOOTH_ITERATIONS ) clipped = smoothFeatures( clipped, SMOOTH_ITERATIONS );

            intersections = turf.featureCollection( clipped );
            console.log( 'intersections', intersections );
        }


        /* ─── Leaflet map ──────────────────────────────────────────── */
        const leafmap = L.map( 'leafMap', {
            renderer:         L.svg( { padding: 500 } ),
            scrollWheelZoom:  false,
            smoothWheelZoom:  true,
            smoothSensitivity: 1
        });

        L.control.scale( { position: 'bottomleft', metric: true, imperial: false, maxWidth: 150 } ).addTo( leafmap );
        L.control.zoom(  { position: 'topright' } ).addTo( leafmap );

        L.tileLayer( 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo( leafmap );

        /* Isoband intersections */
        if ( RUN_CONTOUR_CLIPPING ) {
            if ( intersections.features.length ) {
                const isoLayer = L.geoJson( intersections, {
                    style:          styleISObands,
                    className:      'intersections' + ( SHADOW_ISOCONTOURS ? ' shadow' : '' ),
                    onEachFeature:  onEachBoundaryFeature
                }).addTo( leafmap );

                leafmap.fitBounds( isoLayer.getBounds(), { padding: [1, 1] } );
            }
        }
        else {
            if ( isobandFC.features.length ) {
                const isoLayer = L.geoJson( isobandFC, {
                    style:          styleISObands,
                    className:      'intersections' + ( SHADOW_ISOCONTOURS ? ' shadow' : '' ),
                    onEachFeature:  onEachBoundaryFeature
                }).addTo( leafmap );

                leafmap.fitBounds( isoLayer.getBounds(), { padding: [1, 1] } );
            }
        }


        /* Reference points */
        if ( SHOW_POINTS ) {
            refPoints.forEach( ( { coords, val } ) => {
                L.circleMarker( coords, stylePoints() )
                 .bindTooltip( `<h4>${ val }</h4>` )
                 .addTo( leafmap );
            });
        }


    };

    init().catch( console.error );

</script>
</html>
